<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>盟約編隊工具</title><style>
:root{--bg:#101318;--panel:#191f27;--panel2:#202833;--line:#34414e;--text:#eef3f5;--muted:#9aa8b3;--cyan:#41c9d4;--gold:#f4bd47;--green:#69d18b;--blue:#5da8ff}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(135deg,rgba(65,201,212,.08),transparent 36%),radial-gradient(circle at 82% 18%,rgba(244,189,71,.1),transparent 28%),var(--bg);color:var(--text);font-family:"Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif}.app{display:grid;grid-template-columns:360px 1fr;gap:18px;min-height:100vh;padding:18px}.side{display:flex;flex-direction:column;gap:14px}.panel,.card,.row{background:rgba(25,31,39,.94);border:1px solid var(--line);border-radius:8px}.panel{padding:14px}.head{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:12px}.head strong{color:var(--cyan)}h1{margin:0;font-size:28px;letter-spacing:0}.hint,.bench-note{color:var(--muted)}.tools{display:flex;gap:10px;flex-wrap:wrap}button,input,select{font:inherit}input,select,.clear,.action{min-height:34px;border:1px solid var(--line);background:#121820;color:var(--text);border-radius:8px;padding:0 10px}.clear{width:100%;margin-top:10px;cursor:pointer}.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}.chip{border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:999px;min-height:34px;padding:0 12px;cursor:pointer}.chip.on{background:var(--cyan);border-color:var(--cyan);color:#071114}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(205px,1fr));gap:12px}.card{min-height:142px;overflow:hidden;display:grid;grid-template-columns:72px minmax(0,1fr);column-gap:14px;color:var(--text);transition:.14s}.card:hover{transform:translateY(-2px);border-color:rgba(65,201,212,.65)}.card.sel{border-color:var(--gold);background:rgba(244,189,71,.13)}.card.bench{border-color:var(--blue);background:rgba(93,168,255,.12)}.card.off{opacity:.48}.portrait{width:72px;height:100%;min-height:142px;background:#121820;object-fit:cover;display:block}.portrait.blank{display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:28px}.card-main{padding:10px 12px 10px 0;min-width:0}.rank{display:inline-flex;align-items:center;justify-content:center;min-width:34px;min-height:26px;border:1px solid var(--line);border-radius:6px;color:var(--gold);margin-bottom:8px}.name{font-size:18px;font-weight:700;margin-bottom:10px}.tags{display:flex;flex-wrap:wrap;gap:5px}.tag{border:1px solid rgba(65,201,212,.42);background:rgba(65,201,212,.1);color:#b8f7fb;border-radius:6px;padding:3px 7px;font-size:13px}.tag.bench-tag{border-color:rgba(93,168,255,.58);color:#cfe6ff;background:rgba(93,168,255,.14)}.actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}.action{cursor:pointer;font-size:13px;min-height:30px}.action.active-main{background:var(--gold);border-color:var(--gold);color:#171103}.action.active-bench{background:var(--blue);border-color:var(--blue);color:#06101f}.team{display:grid;gap:8px;min-height:110px}.row{padding:9px 10px;margin-bottom:8px}.rowline{display:flex;justify-content:space-between;gap:10px}.meter{height:7px;margin-top:8px;border-radius:999px;background:#11161d;overflow:hidden}.meter span{display:block;height:100%;background:var(--cyan)}.ready .meter span{background:var(--green)}.max .meter span{background:var(--gold)}.empty{color:var(--muted);border:1px dashed var(--line);border-radius:8px;padding:18px;text-align:center}.remove{float:right;border:1px solid var(--line);background:#121820;color:var(--text);border-radius:6px;width:32px;height:32px;cursor:pointer}.bench-note{font-size:13px;margin:-4px 0 10px}@media(max-width:900px){.app{grid-template-columns:1fr}.head,.tools{align-items:stretch;flex-direction:column}input{width:100%}.grid{grid-template-columns:repeat(auto-fill,minmax(190px,1fr))}.card{grid-template-columns:66px minmax(0,1fr)}.portrait{width:66px}}
</style></head><body><main class="app"><aside class="side"><section class="panel"><div class="head"><span>編隊</span><strong id="count">0 / 9</strong></div><div class="team" id="team"></div><button class="clear" id="clear" type="button">清空上場</button></section><section class="panel"><div class="head"><span>台下</span><strong id="benchCount">0</strong></div><div class="bench-note">只計入投資人、遠見、奇蹟</div><div class="team" id="benchTeam"></div><button class="clear" id="clearBench" type="button">清空台下</button></section><section class="panel"><div class="head"><span>羈絆統計</span><strong id="active">0</strong></div><div id="stats"></div></section></aside><section><header class="head"><div><h1>盟約編隊工具</h1><div class="hint">上場最多 9 人；有投資人、遠見、奇蹟的幹員可放台下。</div></div><div class="tools"><input id="q" type="search" placeholder="搜尋幹員或盟約"><select id="rank"><option value="">全部階級</option><option>I</option><option>II</option><option>III</option><option>IV</option><option>V</option><option>VI</option></select></div></header><div class="chips" id="chips"></div><div class="grid" id="grid"></div></section></main><script>
const max=9,benchBonds=["投資人","遠見","奇蹟"],coreBonds=["炎","薩爾貢","維多利亞","謝拉格","拉特蘭","阿戈爾"];
const bonds=[["炎",3,6],["薩爾貢",3,6],["維多利亞",3,6],["謝拉格",3,6],["拉特蘭",3,6],["阿戈爾",3,5],["投資人",3,3],["調和",1,1],["遠見",2,2],["精準",2,3],["堅守",2,3],["突襲",2,2],["奇蹟",2,2],["不屈",2,3],["迅捷",2,2],["助力",2,3],["靈巧",2,2],["協防幹員",3,3]];
const raw=`I|隱現|拉特蘭;I|驚蟄|炎;I|紅豆|不屈;I|拉普蘭德|協防幹員;I|躍躍|精準;I|遠山|遠見,奇蹟;I|暴行|助力;I|訊使|謝拉格,不屈;I|幽靈鯊|阿戈爾;I|梅|維多利亞,精準;I|德克薩斯|迅捷;I|蛇屠箱|堅守;I|獅蠍|薩爾貢,突襲;I|布丁|靈巧;II|送葬人|拉特蘭,精準;II|角峰|謝拉格,堅守;II|哈洛德|維多利亞,謝拉格;II|深巡|阿戈爾;II|宴|突襲,助力;II|風丸|奇蹟,不屈;II|錫人|迅捷,靈巧;II|芳汀|拉特蘭;II|赫默|遠見;II|萬頃|炎;II|莎草|薩爾貢;II|暴雨|薩爾貢,堅守;II|洛洛|維多利亞,靈巧;II|礫|突襲,不屈;II|錫蘭|助力;III|能天使|拉特蘭,奇蹟;III|槐琥|炎,不屈;III|斯卡蒂|阿戈爾,堅守,突襲;III|見行者|拉特蘭;III|蜜莓|協防幹員;III|雪雉|謝拉格,精準;III|至簡|薩爾貢,靈巧;III|極光|謝拉格;III|琳琅詩懷雅|炎,投資人;III|菲萊|薩爾貢;III|海蒂|維多利亞,助力;III|安哲拉|阿戈爾,精準;III|伊桑|協防幹員;III|耶拉|謝拉格,遠見;IV|信仰攪拌機|拉特蘭,堅守;IV|初雪|謝拉格,助力;IV|森蚺|薩爾貢;IV|風笛|維多利亞,遠見,不屈;IV|水月|阿戈爾,迅捷;IV|華法琳|奇蹟;IV|靈知|謝拉格,靈巧;IV|桑葚|炎,助力;IV|菲亞梅塔|拉特蘭;IV|伊內絲|遠見,突襲;IV|寒芒克洛絲|精準;IV|山|投資人;IV|忍冬|突襲,迅捷;IV|星源|奇蹟;IV|萊恩哈特|精準,迅捷;IV|緘默德克薩斯|突襲,靈巧;IV|煌|炎,維多利亞;IV|亞葉|助力,協防幹員;V|聖約送葬人|拉特蘭,遠見;V|燭煌|炎,維多利亞;V|烏爾比安|阿戈爾;V|史爾特爾|突襲;V|魔王|奇蹟,協防幹員;V|塞雷婭|堅守;V|異客|薩爾貢,精準;V|左樂|炎;V|歌蕾蒂婭|阿戈爾;V|滌火潔西卡|維多利亞,投資人;V|鈴蘭|協防幹員;V|林|炎,靈巧;V|歸溟幽靈鯊|阿戈爾,不屈;V|銀灰|謝拉格,投資人,奇蹟;V|白面鴞|助力,靈巧;V|提豐|精準,靈巧;V|引星棘刺|奇蹟,迅捷;V|瑰鹽|迅捷;VI|蕾繆安|拉特蘭,精準;VI|餘|炎,堅守;VI|娜仁圖亞|薩爾貢;VI|維娜・維多利亞|維多利亞,奇蹟;VI|純燼艾雅法拉|助力;VI|繆爾賽思|調和;VI|新約能天使|拉特蘭;VI|淬羽赫默|靈巧,協防幹員;VI|鋼|謝拉格,迅捷;VI|濁心斯卡蒂|阿戈爾;VI|佩佩|薩爾貢,不屈;VI|澄閃|維多利亞;VI|死芒|迅捷;VI|伊芙利特|精準;VI|流明|助力,協防幹員;VI|泥岩|堅守,不屈`;
const aliases={"純燼艾雅法拉":"奶羊 艾雅法拉","引星棘刺":"星棘 棘刺"};
const extraImages={"引星棘刺":"assets/thorn_face.jpg","瑰鹽":"assets/guiyan_face.jpg","亞葉":"assets/aya_face.jpg"};
let imageMap={},selected=new Set(),bench=new Set(),filter="";const ops=raw.split(";").map(x=>{let p=x.split("|");return{rank:p[0],name:p[1],bonds:p[2].split(",")}});
async function loadImages(){try{let html=await fetch('legacy-index.html').then(r=>r.text());let m=html.match(/var imageMap=(\{[\s\S]*?\});\s*var ops=/);if(m)imageMap=JSON.parse(m[1])}catch(e){console.warn(e)}Object.assign(imageMap,extraImages);render()}
function el(id){return document.getElementById(id)}function isBenchEligible(o){return o.bonds.some(b=>benchBonds.includes(b))}function benchTags(o){return o.bonds.filter(b=>benchBonds.includes(b))}
function makeTags(items){let box=document.createElement('div');box.className='tags';items.forEach(t=>{let s=document.createElement('span');s.className='tag '+(benchBonds.includes(t)?'bench-tag':'');s.textContent=t;box.appendChild(s)});return box}
function addPortrait(card,o){let src=imageMap[o.name];if(src){let img=document.createElement('img');img.className='portrait';img.src=src;img.alt=o.name;card.appendChild(img)}else{let b=document.createElement('div');b.className='portrait blank';b.textContent=o.name[0];card.appendChild(b)}}
function renderChips(){let chips=el('chips');chips.innerHTML='';['全部',...bonds.map(b=>b[0])].forEach(n=>{let btn=document.createElement('button');btn.type='button';btn.className='chip '+((n==='全部'&&!filter)||filter===n?'on':'');btn.textContent=n;btn.dataset.bond=n==='全部'?'':n;chips.appendChild(btn)})}
function renderCards(){let word=el('q').value.trim(),rank=el('rank').value,full=selected.size>=max,grid=el('grid');grid.innerHTML='';let shown=ops.filter(o=>(!rank||o.rank===rank)&&(!filter||o.bonds.includes(filter))&&(!word||(o.name+' '+(aliases[o.name]||'')+' '+o.rank+' '+o.bonds.join(' ')).includes(word)));shown.forEach(o=>{let card=document.createElement('div');card.className='card '+(selected.has(o.name)?'sel ':bench.has(o.name)?'bench ':(full?'off ':''));addPortrait(card,o);let main=document.createElement('div');main.className='card-main';main.innerHTML='<span class="rank">'+o.rank+'</span><div class="name">'+o.name+'</div>';main.appendChild(makeTags(o.bonds));let actions=document.createElement('div');actions.className='actions';let b=document.createElement('button');b.type='button';b.className='action '+(selected.has(o.name)?'active-main':'');b.textContent=selected.has(o.name)?'已上場':'上場';b.onclick=()=>toggleMain(o.name);actions.appendChild(b);if(isBenchEligible(o)){let bb=document.createElement('button');bb.type='button';bb.className='action '+(bench.has(o.name)?'active-bench':'');bb.textContent=bench.has(o.name)?'已台下':'台下';bb.onclick=()=>toggleBench(o.name);actions.appendChild(bb)}main.appendChild(actions);card.appendChild(main);grid.appendChild(card)});if(!shown.length)grid.innerHTML='<div class="empty">沒有符合條件的幹員</div>'}
function rowFor(o,mode){let row=document.createElement('div');row.className='row';let rm=document.createElement('button');rm.type='button';rm.className='remove';rm.textContent='×';rm.onclick=()=>{(mode==='bench'?bench:selected).delete(o.name);render()};row.appendChild(rm);let s=document.createElement('strong');s.textContent=o.name;row.appendChild(s);row.appendChild(makeTags(mode==='bench'?benchTags(o):o.bonds));return row}
function renderSide(){let chosen=ops.filter(o=>selected.has(o.name)),benched=ops.filter(o=>bench.has(o.name));el('count').textContent=chosen.length+' / '+max;el('team').innerHTML='';chosen.forEach(o=>el('team').appendChild(rowFor(o,'main')));if(!chosen.length)el('team').innerHTML='<div class="empty">尚未選擇幹員</div>';el('benchCount').textContent=benched.length;el('benchTeam').innerHTML='';benched.forEach(o=>el('benchTeam').appendChild(rowFor(o,'bench')));if(!benched.length)el('benchTeam').innerHTML='<div class="empty">尚未放入台下</div>'}
function renderStats(){let counts={};bonds.forEach(b=>counts[b[0]]=0);let field=ops.filter(o=>selected.has(o.name));field.forEach(o=>o.bonds.forEach(b=>counts[b]++));let harmony=field.filter(o=>o.bonds.includes('調和')).length;if(harmony)coreBonds.forEach(b=>counts[b]+=harmony);ops.filter(o=>bench.has(o.name)).forEach(o=>o.bonds.forEach(b=>{if(benchBonds.includes(b))counts[b]++}));let activeBonds=bonds.filter(b=>counts[b[0]]>=b[1]),visible=bonds.filter(b=>counts[b[0]]>=b[1]||(benchBonds.includes(b[0])&&counts[b[0]]>0));el('active').textContent=activeBonds.length;el('stats').innerHTML='';if(!visible.length)el('stats').innerHTML='<div class="empty">尚未啟動羈絆</div>';visible.forEach(b=>{let c=counts[b[0]],ready=c>=b[1],row=document.createElement('div');row.className='row '+(c>=b[2]?'max':ready?'ready':'');row.innerHTML='<div class="rowline"><strong>'+b[0]+'</strong><span>'+c+' / '+b[2]+(ready?'':'，未啟動')+'</span></div><div class="meter"><span style="width:'+Math.min(100,c/b[2]*100)+'%"></span></div>';el('stats').appendChild(row)})}
function toggleMain(n){if(selected.has(n))selected.delete(n);else if(selected.size<max){bench.delete(n);selected.add(n)}render()}function toggleBench(n){let o=ops.find(x=>x.name===n);if(!o||!isBenchEligible(o))return;if(bench.has(n))bench.delete(n);else{selected.delete(n);bench.add(n)}render()}function render(){renderChips();renderCards();renderSide();renderStats()}
el('chips').onclick=e=>{let b=e.target.closest('.chip');if(!b)return;filter=b.dataset.bond;render()};el('q').oninput=render;el('rank').onchange=render;el('clear').onclick=()=>{selected.clear();render()};el('clearBench').onclick=()=>{bench.clear();render()};render();loadImages();
</script></body></html>
