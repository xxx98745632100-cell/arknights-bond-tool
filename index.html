<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>盟約編隊工具</title><style>:root{--bg:#10151c;--p:#18202a;--p2:#202a36;--l:#334353;--t:#eef6f7;--m:#9fb0bc;--c:#39d0dc;--g:#f2b944;--b:#5da8ff;--ok:#65d28d}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--t);font-family:"Microsoft JhengHei",system-ui,sans-serif}.app{display:grid;grid-template-columns:360px 1fr;gap:18px;min-height:100vh;padding:18px}.panel,.card,.row{background:var(--p);border:1px solid var(--l);border-radius:8px}.side{display:flex;flex-direction:column;gap:14px}.panel{padding:14px}.head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}.head strong{color:var(--c)}h1{margin:0 0 4px;font-size:28px}.hint,.note,.status{color:var(--m)}.tools,.chips,.tags,.acts,.saveBtns{display:flex;gap:8px;flex-wrap:wrap}input,select,button{font:inherit}input,select,.clear,.act,.download{min-height:34px;border:1px solid var(--l);background:#111820;color:var(--t);border-radius:8px;padding:0 10px}.clear{width:100%;margin-top:10px}.chip{border:1px solid var(--l);background:var(--p2);color:var(--t);border-radius:999px;min-height:34px;padding:0 12px}.chip.on{background:var(--c);border-color:var(--c);color:#061215}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}.card{min-height:142px;overflow:hidden;display:grid;grid-template-columns:72px minmax(0,1fr);gap:16px}.card.sel{border-color:var(--g);background:#2a2418}.card.bench{border-color:var(--b);background:#172335}.card.off{opacity:.45}.pic{width:72px;height:142px;object-fit:cover;background:#111820}.blank{display:grid;place-items:center;color:var(--m);font-size:28px}.main{padding:10px 10px 10px 0;min-width:0}.rank{display:inline-grid;place-items:center;min-width:34px;min-height:26px;border:1px solid var(--l);border-radius:6px;color:var(--g);margin-bottom:8px}.name{font-size:18px;font-weight:700;margin-bottom:9px;word-break:keep-all}.tag{border:1px solid #2d8790;background:#123039;color:#bff8fb;border-radius:6px;padding:3px 7px;font-size:13px}.tag.benchTag{border-color:#4e87c8;background:#152b46;color:#d4eaff}.acts{margin-top:10px}.act{min-height:30px;font-size:13px;cursor:pointer}.act.onM{background:var(--g);border-color:var(--g);color:#171103}.act.onB{background:var(--b);border-color:var(--b);color:#06101f}.download{display:none;align-items:center;text-decoration:none;font-size:13px}.team{display:grid;gap:8px;min-height:96px}.row{padding:9px 10px;margin-bottom:8px}.rowline{display:flex;justify-content:space-between;gap:10px}.bar{height:7px;margin-top:8px;border-radius:999px;background:#10161d;overflow:hidden}.bar span{display:block;height:100%;background:var(--c)}.ready .bar span{background:var(--ok)}.maxed .bar span{background:var(--g)}.empty{color:var(--m);border:1px dashed var(--l);border-radius:8px;padding:18px;text-align:center}.rm{float:right;width:30px;height:30px;border:1px solid var(--l);background:#111820;color:var(--t);border-radius:6px}.previewCanvas{display:none;width:100%;height:auto;margin-top:10px;background:#10151c;border:1px solid var(--l);border-radius:8px}.previewCanvas.on{display:block}@media(max-width:900px){.app{grid-template-columns:1fr}.head,.tools{align-items:stretch;flex-direction:column}input{width:100%}.grid{grid-template-columns:repeat(auto-fill,minmax(190px,1fr))}.card{grid-template-columns:66px minmax(0,1fr);gap:14px}.pic{width:66px}}</style></head><body><main class="app"><aside class="side"><section class="panel"><div class="head"><span>編隊</span><strong id="cnt">0 / 9</strong></div><div id="team" class="team"></div><button id="clear" class="clear">清空上場</button></section><section class="panel"><div class="head"><span>台下</span><strong id="bcnt">0</strong></div><div class="note">只計入投資人、遠見、奇蹟</div><div id="bench" class="team"></div><button id="clearB" class="clear">清空台下</button></section><section class="panel"><div class="head"><span>儲存</span><strong id="saveState">未儲存</strong></div><div class="saveBtns"><button id="saveTeam" class="act">儲存編隊</button><button id="loadTeam" class="act">載入儲存</button><button id="clearSave" class="act">清除儲存</button></div><div id="saveMsg" class="status"></div></section><section class="panel"><div class="head"><span>圖片</span><strong id="imgState">未產生</strong></div><div class="saveBtns"><button id="showImg" class="act">顯示圖片</button><a id="downloadImg" class="download" download="盟約編隊.png">下載圖片</a></div><canvas id="preview" class="previewCanvas" width="1080" height="720"></canvas></section><section class="panel"><div class="head"><span>羈絆統計</span><strong id="active">0</strong></div><div id="stats"></div></section></aside><section><header class="head"><div><h1>盟約編隊工具</h1><div class="hint">點選幹員加入隊伍，最多 9 人。</div></div><div class="tools"><input id="q" type="search" placeholder="搜尋幹員或盟約"><select id="rank"><option value="">全部階級</option><option>I</option><option>II</option><option>III</option><option>IV</option><option>V</option><option>VI</option></select></div></header><div id="chips" class="chips"></div><div id="grid" class="grid"></div></section></main><script>const MAX=9,SAVE_KEY="arknightsBondToolTeamV2",BENCH=["投資人","遠見","奇蹟"],CORE=["炎","薩爾貢","維多利亞","謝拉格","拉特蘭","阿戈爾"],BONDS=[["炎",3,6],["薩爾貢",3,6],["維多利亞",3,6],["謝拉格",3,6],["拉特蘭",3,6],["阿戈爾",3,5],["投資人",3,3],["調和",1,1],["遠見",2,2],["精準",2,3],["堅守",2,3],["突襲",2,2],["奇蹟",2,2],["不屈",2,2],["迅捷",2,2],["助力",2,3],["靈巧",2,2],["協防幹員",3,3]];
const RAW=`I|隱現|拉特蘭;I|驚蟄|炎;I|紅豆|不屈;I|拉普蘭德|協防幹員;I|躍躍|精準;I|遠山|遠見,奇蹟;I|暴行|助力;I|訊使|謝拉格,不屈;I|幽靈鯊|阿戈爾;I|梅|維多利亞,精準;I|德克薩斯|迅捷;I|蛇屠箱|堅守;I|獅蠍|薩爾貢,突襲;I|布丁|靈巧;II|送葬人|拉特蘭,精準;II|角峰|謝拉格,堅守;II|哈洛德|維多利亞,謝拉格;II|深巡|阿戈爾;II|宴|突襲,助力;II|風丸|奇蹟,不屈;II|錫人|迅捷,靈巧;II|芳汀|拉特蘭;II|赫默|遠見;II|萬頃|炎;II|莎草|薩爾貢;II|暴雨|薩爾貢,堅守;II|洛洛|維多利亞,靈巧;II|礫|突襲,不屈;II|錫蘭|助力;III|能天使|拉特蘭,奇蹟;III|槐琥|炎,不屈;III|斯卡蒂|阿戈爾,堅守,突襲;III|見行者|拉特蘭;III|蜜莓|協防幹員;III|雪雉|謝拉格,精準;III|至簡|薩爾貢,靈巧;III|極光|謝拉格;III|琳琅詩懷雅|炎,投資人;III|菲萊|薩爾貢;III|海蒂|維多利亞,助力;III|安哲拉|阿戈爾,精準;III|伊桑|協防幹員;III|耶拉|謝拉格,遠見;IV|信仰攪拌機|拉特蘭,堅守;IV|初雪|謝拉格,助力;IV|森蚺|薩爾貢;IV|風笛|維多利亞,遠見,不屈;IV|水月|阿戈爾,迅捷;IV|華法琳|奇蹟;IV|靈知|謝拉格,靈巧;IV|桑葚|炎,助力;IV|菲亞梅塔|拉特蘭;IV|伊內絲|遠見,突襲;IV|寒芒克洛絲|精準;IV|山|投資人;IV|忍冬|突襲,迅捷;IV|星源|奇蹟;IV|萊恩哈特|精準,迅捷;IV|緘默德克薩斯|突襲,靈巧;IV|煌|炎,維多利亞;IV|亞葉|助力,協防幹員;V|聖約送葬人|拉特蘭,遠見;V|燭煌|炎,維多利亞;V|烏爾比安|阿戈爾;V|史爾特爾|突襲;V|魔王|奇蹟,協防幹員;V|塞雷婭|堅守;V|異客|薩爾貢,精準;V|左樂|炎;V|歌蕾蒂婭|阿戈爾;V|滌火潔西卡|維多利亞,投資人;V|鈴蘭|協防幹員;V|林|炎,靈巧;V|引星棘刺|奇蹟,迅捷;V|瑰鹽|迅捷;V|歸溟幽靈鯊|阿戈爾,不屈;V|銀灰|謝拉格,投資人,奇蹟;V|白面鴞|助力,靈巧;V|提豐|精準,靈巧;VI|蕾繆安|拉特蘭,精準;VI|餘|炎,堅守;VI|娜仁圖亞|薩爾貢;VI|維娜・維多利亞|維多利亞,奇蹟;VI|純燼艾雅法拉|助力;VI|繆爾賽思|調和;VI|新約能天使|拉特蘭;VI|淬羽赫默|靈巧,協防幹員;VI|鋼|謝拉格,迅捷;VI|濁心斯卡蒂|阿戈爾;VI|佩佩|薩爾貢,不屈;VI|澄閃|維多利亞;VI|死芒|迅捷;VI|伊芙利特|精準;VI|流明|助力,協防幹員;VI|泥岩|堅守,不屈`;
const IMG="data:image/jpeg;base64,",EXTRA={"引星棘刺":"assets/thorn_face.jpg"},EXTRA_B64={"亞葉":"assets/aya_from_new.b64","瑰鹽":"assets/guiyan_from_new.b64"};
let imgs={},sel=new Set(),ben=new Set(),flt="";const OPS=RAW.split(";").map(s=>{let p=s.split("|");return{rank:p[0],name:p[1],bonds:p[2].split(",")}}),BY=Object.fromEntries(OPS.map(o=>[o.name,o])),A={"純燼艾雅法拉":"奶羊 艾雅法拉","引星棘刺":"星棘 棘刺"};
async function loadImgs(){try{let h=await fetch('legacy-index.html?v=20260702c').then(r=>r.text()),m=h.match(/var imageMap=(\{[\s\S]*?\});\s*var ops=/);if(m)imgs=JSON.parse(m[1])}catch(e){}await Promise.all(Object.entries(EXTRA_B64).map(async([name,url])=>{try{let b64=(await fetch(url+'?v=20260702c').then(r=>r.text())).trim();if(b64)EXTRA[name]=IMG+b64}catch(e){}}));Object.assign(imgs,EXTRA);draw()}
const $=id=>document.getElementById(id),benchable=o=>o.bonds.some(b=>BENCH.includes(b)),benchTags=o=>o.bonds.filter(b=>BENCH.includes(b)),roster=s=>OPS.filter(o=>s.has(o.name));function tags(a){let d=document.createElement('div');d.className='tags';a.forEach(x=>{let s=document.createElement('span');s.className='tag '+(BENCH.includes(x)?'benchTag':'');s.textContent=x;d.append(s)});return d}
function portrait(c,o){if(imgs[o.name]){let im=new Image();im.className='pic';im.src=imgs[o.name];im.alt=o.name;c.append(im)}else{let b=document.createElement('div');b.className='pic blank';b.textContent=o.name[0];c.append(b)}}
function card(o){let c=document.createElement('div');c.className='card '+(sel.has(o.name)?'sel ':ben.has(o.name)?'bench ':sel.size>=MAX?'off ':'');portrait(c,o);let m=document.createElement('div');m.className='main';m.innerHTML=`<span class="rank">${o.rank}</span><div class="name">${o.name}</div>`;m.append(tags(o.bonds));let ac=document.createElement('div');ac.className='acts';let up=document.createElement('button');up.className='act '+(sel.has(o.name)?'onM':'');up.textContent=sel.has(o.name)?'已上場':'上場';up.onclick=()=>{sel.has(o.name)?sel.delete(o.name):(sel.size<MAX&&(ben.delete(o.name),sel.add(o.name)));draw()};ac.append(up);if(benchable(o)){let bb=document.createElement('button');bb.className='act '+(ben.has(o.name)?'onB':'');bb.textContent=ben.has(o.name)?'已台下':'台下';bb.onclick=()=>{ben.has(o.name)?ben.delete(o.name):(sel.delete(o.name),ben.add(o.name));draw()};ac.append(bb)}m.append(ac);c.append(m);return c}
function drawChips(){let box=$('chips');box.innerHTML='';['全部',...BONDS.map(b=>b[0])].forEach(n=>{let b=document.createElement('button');b.className='chip '+((n==='全部'&&!flt)||flt===n?'on':'');b.textContent=n;b.onclick=()=>{flt=n==='全部'?'':n;draw()};box.append(b)})}
function drawGrid(){let q=$('q').value.trim(),r=$('rank').value,g=$('grid');g.innerHTML='';let list=OPS.filter(o=>(!r||o.rank===r)&&(!flt||o.bonds.includes(flt))&&(!q||(o.name+' '+(A[o.name]||'')+' '+o.rank+' '+o.bonds.join(' ')).includes(q)));list.forEach(o=>g.append(card(o)));if(!list.length)g.innerHTML='<div class="empty">沒有符合條件的幹員</div>'}
function sideRow(o,mode){let r=document.createElement('div');r.className='row';let x=document.createElement('button');x.className='rm';x.textContent='×';x.onclick=()=>{(mode==='b'?ben:sel).delete(o.name);draw()};r.append(x);let s=document.createElement('strong');s.textContent=o.name;r.append(s,tags(mode==='b'?benchTags(o):o.bonds));return r}
function drawSide(){let t=roster(sel),b=roster(ben);$('cnt').textContent=t.length+' / '+MAX;$('bcnt').textContent=b.length;$('team').innerHTML='';$('bench').innerHTML='';t.forEach(o=>$('team').append(sideRow(o,'m')));b.forEach(o=>$('bench').append(sideRow(o,'b')));if(!t.length)$('team').innerHTML='<div class="empty">尚未選擇幹員</div>';if(!b.length)$('bench').innerHTML='<div class="empty">尚未放入台下</div>'}
function bondInfo(){let c={};BONDS.forEach(b=>c[b[0]]=0);let field=roster(sel);field.forEach(o=>o.bonds.forEach(b=>c[b]++));let h=field.filter(o=>o.bonds.includes('調和')).length;if(h)CORE.forEach(b=>c[b]+=h);roster(ben).forEach(o=>o.bonds.forEach(b=>{if(BENCH.includes(b))c[b]++}));let vis=BONDS.filter(b=>c[b[0]]>=b[1]||(BENCH.includes(b[0])&&c[b[0]]>0)),act=BONDS.filter(b=>c[b[0]]>=b[1]);return{counts:c,visible:vis,active:act}}
function drawStats(){let info=bondInfo();$('active').textContent=info.active.length;$('stats').innerHTML='';if(!info.visible.length)$('stats').innerHTML='<div class="empty">尚未啟動羈絆</div>';info.visible.forEach(b=>{let n=info.counts[b[0]],ready=n>=b[1],row=document.createElement('div');row.className='row '+(n>=b[2]?'maxed':ready?'ready':'');row.innerHTML=`<div class="rowline"><strong>${b[0]}</strong><span>${n} / ${b[2]}${ready?'':'，未啟動'}</span></div><div class="bar"><span style="width:${Math.min(100,n/b[2]*100)}%"></span></div>`;$('stats').append(row)})}
function updateSaveState(){let ok=false;try{ok=!!localStorage.getItem(SAVE_KEY)}catch(e){}$('saveState').textContent=ok?'已儲存':'未儲存'}function setMsg(t){$('saveMsg').textContent=t||''}function saveCurrent(){try{localStorage.setItem(SAVE_KEY,JSON.stringify({field:[...sel],bench:[...ben],time:Date.now()}));setMsg('已儲存目前編隊');updateSaveState()}catch(e){setMsg('儲存失敗')}}function loadSaved(){try{let raw=localStorage.getItem(SAVE_KEY);if(!raw){setMsg('沒有儲存資料');return}let data=JSON.parse(raw);sel.clear();ben.clear();(data.field||[]).forEach(n=>{if(BY[n]&&sel.size<MAX)sel.add(n)});(data.bench||[]).forEach(n=>{if(BY[n]&&benchable(BY[n])&&!sel.has(n))ben.add(n)});setMsg('已載入儲存編隊');draw()}catch(e){setMsg('載入失敗')}}function clearSaved(){try{localStorage.removeItem(SAVE_KEY);setMsg('已清除儲存');updateSaveState()}catch(e){setMsg('清除失敗')}}function loadPic(src){return new Promise(res=>{let im=new Image();im.onload=()=>res(im);im.onerror=()=>res(null);im.src=src})}function fit(ctx,text,x,y,w,size,color){ctx.fillStyle=color;ctx.font='700 '+size+'px Microsoft JhengHei, sans-serif';while(ctx.measureText(text).width>w&&size>13){size--;ctx.font='700 '+size+'px Microsoft JhengHei, sans-serif'}ctx.fillText(text,x,y)}function chipText(ctx,text,x,y,color){ctx.font='16px Microsoft JhengHei, sans-serif';let w=ctx.measureText(text).width+20;ctx.fillStyle=color;ctx.fillRect(x,y-18,w,24);ctx.fillStyle='#eef6f7';ctx.fillText(text,x+10,y);return w+8}async function drawOne(ctx,o,x,y,w,h){ctx.fillStyle='#18202a';ctx.fillRect(x,y,w,h);ctx.strokeStyle='#334353';ctx.strokeRect(x,y,w,h);let im=imgs[o.name]?await loadPic(imgs[o.name]):null;if(im)ctx.drawImage(im,x+10,y+10,62,108);else{ctx.fillStyle='#202a36';ctx.fillRect(x+10,y+10,62,108);fit(ctx,o.name[0],x+30,y+70,30,28,'#9fb0bc')}ctx.fillStyle='#f2b944';ctx.font='18px Microsoft JhengHei, sans-serif';ctx.fillText(o.rank,x+84,y+30);fit(ctx,o.name,x+84,y+58,w-94,21,'#eef6f7');let cx=x+84,cy=y+88;o.bonds.slice(0,3).forEach(b=>{cx+=chipText(ctx,b,cx,cy,BENCH.includes(b)?'#1c4b78':'#14545c')})}async function renderImage(){let cv=$('preview'),ctx=cv.getContext('2d'),field=roster(sel),benched=roster(ben),info=bondInfo();ctx.clearRect(0,0,1080,720);ctx.fillStyle='#10151c';ctx.fillRect(0,0,1080,720);ctx.fillStyle='#39d0dc';ctx.font='700 34px Microsoft JhengHei, sans-serif';ctx.fillText('盟約編隊',36,50);ctx.fillStyle='#9fb0bc';ctx.font='18px Microsoft JhengHei, sans-serif';ctx.fillText('上場 '+field.length+' / 9　台下 '+benched.length+'　啟動羈絆 '+info.active.length,36,80);if(!field.length){ctx.fillStyle='#9fb0bc';ctx.font='26px Microsoft JhengHei, sans-serif';ctx.fillText('尚未選擇幹員',430,290)}for(let i=0;i<field.length;i++){let col=i%3,row=Math.floor(i/3);await drawOne(ctx,field[i],36+col*342,105+row*135,310,122)}ctx.fillStyle='#5da8ff';ctx.font='700 22px Microsoft JhengHei, sans-serif';ctx.fillText('台下',36,532);ctx.fillStyle='#eef6f7';ctx.font='18px Microsoft JhengHei, sans-serif';let bx=92;benched.forEach(o=>{let label=o.name+'('+benchTags(o).join('/')+')';let width=ctx.measureText(label).width+22;if(bx+width>1040){bx=92}ctx.fillStyle='#152b46';ctx.fillRect(bx,510,width,32);ctx.fillStyle='#d4eaff';ctx.fillText(label,bx+11,532);bx+=width+8});ctx.fillStyle='#65d28d';ctx.font='700 22px Microsoft JhengHei, sans-serif';ctx.fillText('羈絆',36,590);let ax=92,ay=590;(info.visible.length?info.visible:[]).forEach(b=>{let text=b[0]+' '+info.counts[b[0]]+'/'+b[2];let width=ctx.measureText(text).width+22;if(ax+width>1040){ax=92;ay+=38}ctx.fillStyle=info.counts[b[0]]>=b[1]?'#215236':'#4a3b16';ctx.fillRect(ax,ay-22,width,32);ctx.fillStyle='#eef6f7';ctx.fillText(text,ax+11,ay);ax+=width+8});if(!info.visible.length){ctx.fillStyle='#9fb0bc';ctx.fillText('尚未啟動羈絆',92,590)}let url=cv.toDataURL('image/png');$('downloadImg').href=url;$('downloadImg').style.display='inline-flex';cv.classList.add('on');$('imgState').textContent='已產生'}
function draw(){drawChips();drawGrid();drawSide();drawStats();updateSaveState()}$('q').oninput=draw;$('rank').onchange=draw;$('clear').onclick=()=>{sel.clear();draw()};$('clearB').onclick=()=>{ben.clear();draw()};$('saveTeam').onclick=saveCurrent;$('loadTeam').onclick=loadSaved;$('clearSave').onclick=clearSaved;$('showImg').onclick=renderImage;draw();loadImgs();</script></body></html>
